services:
  - type: web
    name: retail-agent-backend
    runtime: python
    buildCommand: pip install fastapi uvicorn sqlalchemy faker pandas python-dotenv langchain langchain-groq apscheduler groq
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false